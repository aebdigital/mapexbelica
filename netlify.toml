[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/kontakt"
  to = "/#kontakt"
  status = 301

[[redirects]]
  from = "/ochrana-osobnych-udajov.html"
  to = "/ochrana-osobnych-udajov"
  status = 301
